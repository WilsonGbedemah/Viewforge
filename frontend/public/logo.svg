  <rect x="0" y="4" width="32" height="32" rx="7" fill="#090909"/>
  <!-- Outer flame -->
  <path
    d="M16 8
       C16 8 22 13 22 18
       C22 20.5 20.5 22.5 19 23.5
       C19.5 21.5 18.5 19.5 17 18.5
       C17.5 21 16 23 14 24.5
       C12 26 11 24 11 22
       C11 19 12.5 16.5 14 15
       C13 17 13.5 19 14.5 19.5
       C14 17 14.5 14 16 12
       C16 12 15 15 16.5 16
       C17.5 14 16 8 16 8Z"
    fill="#e63528"
  />
  <!-- Inner flame highlight -->
  <path
    d="M16 16
       C16 16 18.5 18.5 18.5 21
       C18.5 22.5 17.5 23.5 16.5 24
       C16.8 22.5 16 21 15 20.5
       C15.5 22 15 23.5 14 24.5
       C13 23 13 21.5 13.5 20
       C14 18.5 15 17.5 16 16Z"
