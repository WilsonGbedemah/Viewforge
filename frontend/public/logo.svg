  >View</text>
  <!-- "Forge" in red -->
  <text
    x="92" y="28"
    font-family="'Syne', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="20"
    letter-spacing="-0.5"
    fill="#e63528"
  >Forge</text>

  <!-- Thin underline accent beneath "Forge" -->
  <line x1="92" y1="31.5" x2="151" y2="31.5" stroke="#e63528" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

</svg>
